<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<title>ECHO</title>

<style>
body{
  margin:0;
  min-height:100vh;
  background:#05080c;
  color:#cfeaff;
  font-family:'DotGothic16',sans-serif;
  background-image:
    linear-gradient(rgba(120,220,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,220,255,.04) 1px, transparent 1px);
  background-size:24px 24px;
}

.echo-page{
  max-width:760px;
  margin:0 auto;
  padding:34px 18px 60px;
}

.echo-header{
  border-bottom:1px solid rgba(180,230,255,.35);
  padding-bottom:18px;
  margin-bottom:30px;
}

.echo-header h1{
  margin:0;
  font-size:32px;
  letter-spacing:3px;
  color:#d8f3ff;
  text-shadow:0 0 10px #72dfff;
}

.echo-intro{
  margin:24px 0 34px;
  padding:22px;
  border:1px solid rgba(170,220,255,.35);
  background:rgba(10,18,28,.72);
  box-shadow:0 0 18px rgba(100,200,255,.15);
  text-align:center;
  line-height:2;
}

.echo-card{
  margin:32px 0;
  padding:24px;
  border:1px solid rgba(170,220,255,.35);
  border-radius:10px;
  background:rgba(8,12,18,.88);
  box-shadow:0 0 18px rgba(120,220,255,.12);
}

.echo-title{
  font-size:24px;
  letter-spacing:3px;
  margin:0 0 8px;
  color:#d8f3ff;
}

.echo-date{
  margin:0 0 24px;
  color:#93a8b8;
}

.bubble{
  max-width:78%;
  width:fit-content;
  padding:12px 16px;
  margin:14px 0;
  border-radius:10px;
  line-height:1.8;
  box-shadow:0 0 12px rgba(120,220,255,.12);
}

.bubble.left{
  margin-right:auto;
  background:rgba(172,167,187,.22);
  border:1px solid rgba(172,167,187,.7);
  color:#e8e4f2;
}

.bubble.right{
  margin-left:auto;
  background:rgba(171,211,216,.22);
  border:1px solid rgba(171,211,216,.8);
  color:#e7fbff;
}

.echo-omit{
  text-align:center;
  margin:22px 0;
  color:#7f91a0;
  letter-spacing:3px;
  font-size:13px;
}

.reply-box{
  margin-top:22px;
  padding:20px;
  border:1px solid rgba(143,234,255,.35);
  background:rgba(8,18,28,.85);
  box-shadow:0 0 14px rgba(143,234,255,.12);
}

.reply-title{
  margin:0 0 10px;
  font-size:20px;
  color:#8feaff;
  letter-spacing:2px;
}

.reply-date{
  color:#93a8b8;
  font-size:13px;
}

.separator{
  border-top:1px dashed rgba(180,230,255,.35);
  margin:28px 0;
}

.return-link{
  color:#8feaff;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="echo-page">

  <div class="echo-header">
    <h1>ECHO</h1>
  </div>

  <div class="echo-intro">
    <p>受信した信号の残響を保存しています。</p>
    <p>一部記録は破損しています。</p>

    <div class="separator"></div>

    <p>忘れたくないと思った言葉達。</p>
    <p>君が僕にくれたもの。</p>
    <p>僕の宝物。</p>
    <p>反響して離れない音。</p>
    <p>どうか色褪せませんように。</p>
  </div>

  <!-- 新しいECHOはこの下に追加 -->

  <div class="echo-card">

    <p class="echo-title">ECHO NO.000</p>
    <p class="echo-date">2023.XX.XX</p>

    <div class="bubble right">
      だいすき
    </div>

    <div class="bubble left">
      きょう
    </div>

    <div class="bubble left">
      みえたつききれいだたよ
    </div>

    <p class="echo-omit">── 中略 ──</p>

    <div class="bubble left">
      さっきのつきは
    </div>

    <div class="bubble left">
      なつめそうせき
    </div>

    <div class="bubble left">
      おやしみ
    </div>

    <div class="bubble right">
      なんで言い逃げばっかするんですか~？
    </div>

    <div class="reply-box">
      <p class="reply-title">928 REPLY</p>
      <p class="reply-date">FROM : 928</p>

      <p>
        ここに928のコメントを書く。
      </p>
    </div>

  </div>

  <div class="separator"></div>

  <a class="return-link" href="archive.html">← RETURN</a>

</div>

<script>
if(sessionStorage.getItem("archiveAccess") !== "granted"){
  location.href = "index.html";
}
</script>

</body>
</html>
