<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUBJECT FILE</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh;
  background-image:url("bg2.png");
  background-size:cover;
  background-position:center;
  color:#c8eaff;
  font-family:'DotGothic16',sans-serif;
  overflow-x:hidden;
}

/* 画面全体の走査線 */
body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.08) 0px,
      rgba(255,255,255,.08) 1px,
      transparent 2px,
      transparent 4px
    );
  mix-blend-mode:screen;
  z-index:999;
}

/* 画面全体に走るカラーノイズ */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(90deg,
      transparent 0%,
      rgba(0,255,255,.18) 20%,
      transparent 30%,
      rgba(255,0,180,.18) 55%,
      transparent 70%,
      rgba(255,255,0,.15) 90%,
      transparent 100%
    );
  opacity:.25;
  animation:noiseMove .45s infinite steps(2);
  z-index:998;
}

.profile-wrap{
  max-width:620px;
  margin:80px auto;
  border:2px solid #6f8cff;
  background:rgba(0,0,40,.78);
  box-shadow:0 0 22px rgba(120,180,255,.55);
  animation:screenBreak 5s infinite;
}

.window-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 10px;
  background:linear-gradient(90deg,#6f8cff,#9bb7ff);
}

.window-title h1{
  margin:0;
  font-size:20px;
  letter-spacing:3px;
  color:white;
}

.window-controls{
  display:flex;
  gap:4px;
}

.window-controls span{
  width:14px;
  height:14px;
  border:1px solid white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:9px;
  background:rgba(255,255,255,.18);
}

.profile-content{
  position:relative;
  padding:24px;
  font-size:16px;
  line-height:2;
}

/* 文字を見にくくする色ズレ */
.glitch-text{
  position:relative;
  text-shadow:
    2px 0 #ff3bd5,
    -2px 0 #35ffff,
    0 0 8px #8feaff;
  animation:textGlitch 1.8s infinite;
}

.label{
  color:#8feaff;
}

.receiving{
  margin-top:24px;
  color:#8feaff;
  animation:blinkReceive .8s infinite;
}

.back-link{
  display:block;
  margin-top:28px;
  color:#ff9bdc;
  text-decoration:none;
}

/* 横にノイズの帯 */
.noise-bar{
  position:absolute;
  left:0;
  right:0;
  height:14px;
  background:linear-gradient(
    90deg,
    #00ffff,
    #ff00cc,
    #ffff00,
    #ffffff,
    #0066ff
  );
  opacity:.35;
  mix-blend-mode:screen;
  animation:barNoise 2.2s infinite steps(1);
}

.noise-bar.one{ top:30%; }
.noise-bar.two{ top:58%; height:8px; }
.noise-bar.three{ top:76%; height:18px; }

/* アニメーション */
@keyframes screenBreak{
  0%,88%,100%{
    filter:none;
    transform:translateX(0);
  }

  89%{
    filter:contrast(1.8) brightness(1.25);
    transform:translateX(-3px);
  }

  90%{
    filter:hue-rotate(80deg) contrast(2);
    transform:translateX(3px);
  }

  91%{
    filter:brightness(.7) contrast(2.2);
    transform:translateX(-1px);
  }

  92%{
    filter:none;
    transform:translateX(0);
  }
}

@keyframes textGlitch{
  0%,85%,100%{
    transform:none;
    opacity:1;
  }

  86%{
    transform:translateX(-2px);
    opacity:.6;
  }

  87%{
    transform:translateX(3px);
    opacity:1;
  }

  88%{
    transform:translateX(-1px);
    opacity:.45;
  }
}

@keyframes noiseMove{
  0%{ transform:translateX(-30px); opacity:.18; }
  50%{ transform:translateX(30px); opacity:.35; }
  100%{ transform:translateX(-10px); opacity:.22; }
}

@keyframes barNoise{
  0%{ transform:translateX(-80%); opacity:0; }
  40%{ opacity:.45; }
  45%{ transform:translateX(40%); opacity:.65; }
  50%{ opacity:0; }
  100%{ transform:translateX(100%); opacity:0; }
}

@keyframes blinkReceive{
  0%,60%,100%{ opacity:1; }
  70%{ opacity:.2; }
  80%{ opacity:1; }
}

@media screen and (max-width:600px){
  .profile-wrap{
    margin:50px 20px;
  }

  .profile-content{
    font-size:14px;
  }
}
</style>
</head>

<body>

<div class="profile-wrap">

  <div class="window-title">
    <h1 class="glitch-text">SUBJECT FILE</h1>

    <div class="window-controls">
      <span>_</span>
      <span>□</span>
      <span>×</span>
    </div>
  </div>

  <div class="profile-content glitch-text">

    <div class="noise-bar one"></div>
    <div class="noise-bar two"></div>
    <div class="noise-bar three"></div>

    <p><span class="label">個体識別コード :</span> 610</p>
    <p>
  <span class="label corrupt-target">個体識別コード :</span>
  <span class="corrupt-target">610</span>
</p>

<p>
  <span class="label">状態 :</span>
  <span class="corrupt-target">ACTIVE</span>
</p>

<p>
  <span class="label corrupt-target">興味対象 :</span><br>
  <span class="corrupt-target">外の世界 / くずは / 記憶</span>
</p>

<p>
  <span class="label">備考 :</span>
  <span class="corrupt-target">重要観察対象</span>
</p>

<p>
  <span class="label corrupt-target">観測継続日数 :</span><br>
  <span class="corrupt-target">XXXX DAYS</span>
</p>

    <p class="receiving">
      Receiving... █
    </p>

    <a href="index.html" class="back-link">
      ← RETURN TO MEMORY
    </a>

  </div>

</div>
<script>
const targets = document.querySelectorAll(".corrupt-target");

targets.forEach(function(target){
  target.dataset.original = target.textContent;
});

function corruptText(text){
  const symbols = ["█", "▓", "▒", "░", "□", "◇", "_"];

  if(text.length <= 1){
    return text;
  }

  const chars = text.split("");
  const count = Math.max(1, Math.floor(chars.length * 0.18));

  for(let i = 0; i < count; i++){
    const index = Math.floor(Math.random() * chars.length);

    if(chars[index] !== " " && chars[index] !== "/" && chars[index] !== ":"){
      chars[index] = symbols[Math.floor(Math.random() * symbols.length)];
    }
  }

  return chars.join("");
}

setInterval(function(){

  const target =
    targets[Math.floor(Math.random() * targets.length)];

  target.textContent =
    corruptText(target.dataset.original);

  target.style.opacity =
    Math.random() > 0.5 ? ".45" : "1";

  setTimeout(function(){
    target.textContent = target.dataset.original;
    target.style.opacity = "1";
  }, 700);

}, 900);
</script>
  
</body>
</html>
