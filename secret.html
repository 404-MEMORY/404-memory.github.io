      <span>□</span>
      <span>×</span>

  <div class="letter-content">
    <p>To : the last signal</p>

    <div class="separator"></div>

    <p>
      
くーちゃんが頑張って発送してくれてコビハムちゃんやお手紙やサプライズプレゼントが入った箱が明日届くらしくて早く帰りたい。最近くーちゃんがゲーム誘ってくれて嬉しいし、けちゃの写真も可愛い。もっとゲームしたいなあ。
    </p>

    <div class="separator"></div>

    <a href="index.html">← RETURN</a>
  </div>
